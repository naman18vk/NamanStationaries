<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMAN'S STATIONARIES - HOME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <h2>Naman Stationaries</h2>
        <div>
            <span id="welcome-message" style="margin-right: 20px; font-weight: bold;"></span>
            <button type="button" class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>
    </div>

    <div>
        <h1>Welcome to Our Stationary Store</h1>
        <p style="text-align: center;">Explore our premium collection of notebooks, pens, and desk accessories.</p>

        <div class="card-container">
            <div class="card">
                <img src="bestfriend copy.jpg" alt="Premium Notebook">
                <h3>Premium Notebook</h3>
               
                <div class="price">₹120</div>
                <button type="button" class="buy-btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="Hauser Pens.jfif" alt="Gel Pen Set">
                <h3>Smooth Gel Pen Set</h3>
              
                <div class="price">₹120</div>
                <button type="button" class="buy-btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="Pencil Pack.jpg" alt="Desk Organizer">
                <h3>Pencil Pack</h3>
              
                <div class="price">₹150</div>
                <button type="button" class="buy-btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="Safari Bag.jfif" alt="Highlighters">
                <h3>Safari Bag</h3>
            
                <div class="price">₹1250</div>
                <button type="button" class="buy-btn">Add to Cart</button>
            </div>
        </div>
    </div>

    <script>
        const user = sessionStorage.getItem("loggedInUser") || localStorage.getItem("savedUsername");

        if (!user) {
            window.location.href = "index.html";
        } else {
            document.getElementById("welcome-message").innerText = "Welcome, " + user + "!";
        }

        function logoutUser() {
            localStorage.removeItem("savedUsername");
            sessionStorage.removeItem("loggedInUser");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
