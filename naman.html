<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAMAN'S WEBSITE - REGISTER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="image-container">
        <img src="n.png" alt="NAMAN'S stationaries" style="display:block; margin:auto;">
    </div>
    <div class="form-container">
        <div>
            <h2>REGISTER - NAMAN'S WEBSITE</h2>
            
            <label>Enter your Name</label> <br>
            <input type="text" id="username"><br><br>
            
            <label>Enter your Mobile no.</label><br> 
            <input type="number" id="mobile_no" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')"><br><br>
            
            <label>Enter your Password</label> <br>
            <input type="password" id="password"><br><br>
            
            <label>Re-Enter your Password</label><br> 
            <input type="password" id="Re-Enter"><br><br>
            
            <button type="button" onclick="saveUserData()">Submit</button><br>
                
            <a href="index.html"><br>
                <div class="back-btn">Back</div>
            </a>
        </div> 
    </div> 

    <!-- ================= JAVASCRIPT LOGIC ENGINE ================= -->
    <script> 
        // Database open karne ki request (Version 4 taaki database clean reset ho ske)
        const dbRequest = indexedDB.open("NamanWebsiteDB", 4);
        let db;

        // Table (Object Store) banane ka function
        dbRequest.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains("users")) {
                db.createObjectStore("users", { keyPath: "srNo", autoIncrement: true });
                console.log("Users table successfully created inside database.");
            }
        };

        // Database successfully init hone par chlega (Error block completely removed from here)
        dbRequest.onsuccess = function(event) {
            db = event.target.result;
            console.log("Database initialized successfully!");
        };

        dbRequest.onerror = function(event) {
            console.error("Database initialization failed:", event.target.error);
        };

        // Submit Button ka main working logic
        function saveUserData() { 
            const name = document.getElementById('username').value.trim();
            const mobile = document.getElementById('mobile_no').value.trim();
            const pass = document.getElementById('password').value;
            const repass = document.getElementById('Re-Enter').value;

            // Form validations checks
            if (!name || !mobile || !pass || !repass) {
                alert("Please fill all fields!");
                return;
            }
            if (pass !== repass) {
                alert("Passwords do not match!");
                return;
            }
            if (!db) {
                alert("Database is not ready yet. Please try again.");
                return;
            }

            const userData = {
                username: name,
                mobileNo: mobile,
                password: pass,
                timestamp: new Date().toLocaleString()
            };

            try {
                const transaction = db.transaction(["users"], "readwrite");
                const store = transaction.objectStore("users");
                const addRequest = store.add(userData);

                addRequest.onsuccess = function(event) {
                    const generatedSrNo = event.target.result;
                    alert(`Registration Successful! Serial Number: ${generatedSrNo}`);
                    
                    // Input elements data clear
                    document.getElementById('username').value = "";
                    document.getElementById('mobile_no').value = "";
                    document.getElementById('password').value = "";
                    document.getElementById('Re-Enter').value = "";
                    
                    // Dynamic username synchronization for homepage greeting
                    localStorage.setItem("savedUsername", name);
                    
                    // Redirect to Login page
                    window.location.href = "index.html";
                };

                addRequest.onerror = function(event) {
                    console.error("Error saving user data:", event.target.error);
                    alert("Failed to save data to the database.");
                };
            } catch (error) {
                console.error("Transaction Error:", error);
                alert("Database store error. Please refresh and try again.");
            }
        }
    </script>
</body>
</html>
