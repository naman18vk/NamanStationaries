<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Naman Stationaries</title>
    
    <!-- CSS File Linking -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <h2>Login - Naman Stationaries</h2>
        
        <!-- Form Layout -->
        <form id="loginForm">
            <div class="input-group">
                <label for="userField">Username</label>
                <input type="text" id="userField" placeholder="Enter Username" required>
            </div>
            
            <div class="input-group" style="margin-top: 20px;">
                <label for="passField">Password</label>
                <input type="password" id="passField" placeholder="Enter Password" required>
            </div>

            <button type="submit" id="loginBtn" class="login-btn" style="margin-top: 20px;">
                Login to Shop
            </button>
        </form>

        <p style="margin-top: 20px; font-size: 14px;">
           For New Account > <a href="naman.html" style="color: #ff4500; font-weight: bold; text-decoration: none;">Register Here</a>
        </p>
    </div>

    <!-- External JavaScript Interfacing Linking -->
    <script src="index.js"></script>
</body>
</html>
