<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Naman Stationaries</title>
    
    <!-- CSS File Linking -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <h2>Naman Stationaries</h2>
        
        <!-- Live Alert Error Banner Panel -->
        <div id="loginError" class="error-message" style="display: none; color: #e53e3e; font-size: 14px; margin-bottom: 15px;">
            Invalid Username or Password!
        </div>

        <!-- Login Form Layout -->
        <form id="loginForm">
            <div class="input-group">
                <label for="userField">Username</label>
                <input type="text" id="userField" placeholder="Enter your name" required>
            </div>
            
            <div class="input-group" style="margin-top: 20px;">
                <label for="passField">Password</label>
                <input type="password" id="passField" placeholder="Enter your password" required>
            </div>

            <button type="submit" id="loginBtn" class="login-btn" style="margin-top: 20px;">
                Login to Shop
            </button>
        </form>
    </div>

    <!-- External JavaScript Interfacing Linking -->
    <script src="login.js"></script>
</body>
</html>
