<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Naman Stationaries</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Naman Stationaries</h1>
    </header>

    <!-- Main Cart Container Area -->
    <main class="cart-container">
        <h2 class="cart-header-title">Your Shopping Cart</h2>

        <!-- Wrapper for handling cart state -->
        <div id="cart-content">
            
            <!-- Products Data Grid Table -->
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-items-tbody">
                    <!-- Data nodes will render here dynamically via JavaScript -->
                </tbody>
            </table>

            <!-- Grand Bill Pricing Label -->
            <div class="cart-total" id="cart-grand-total">
                Grand Total: Rs. 0
            </div>

            <!-- Page Action Control Links -->
            <div class="cart-actions">
                <a href="homepage.html" class="btn-shop">← Continue Shopping</a>
                <button class="btn-checkout" onclick="checkoutAlert()">Proceed to Checkout</button>
            </div>

        </div>
    </main>
      <script src="cart.js"></script>

</body>
</html>
