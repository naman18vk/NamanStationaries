<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Naman Stationaries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body class="cart-page">

    <header>
        <div class="top-banner">ALL STATIONERY ITEMS ARE AVAILABLE AT OUR SHOP</div>
        <nav class="navbar-container">
            <div class="logo">Naman Stationaries</div>
            <ul class="nav-links">
                <li class="li"><a href="homepage.html" style="color: inherit; text-decoration: none;">Home</a></li>
                <li class="li"><a href="homepage.html#productGrid" style="color: inherit; text-decoration: none;">Shop</a></li>
            </ul>
        </nav>
    </header>

    <main class="cart-container">
        <h2>Your Shopping Cart</h2>

        <!-- Items Table -->
        <table class="cart-table" id="cartTable">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cartTableBody">
                <!-- Rows will be injected here via JavaScript -->
            </tbody>
        </table>

        <!-- Total and Checkout Section -->
        <div class="cart-summary-box" id="summaryBox">
            <div class="grand-total">Grand Total: <span id="cartGrandTotal">Rs. 0</span></div>
            <button class="checkout-btn" onclick="clearCart()">Clear Cart</button>
        </div>
        
        <div class="empty-cart-msg" id="emptyMessage" style="display: none;">
            <h3>Your cart is empty!</h3>
            <a href="homepage.html">Go Back to Shop</a>
        </div>
    </main>

    <!-- Linking Cart Logic -->
    <script src="cart.js"></script>
</body>
</html>
