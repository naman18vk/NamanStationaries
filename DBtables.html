
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexedDB Manager</title>

    <link rel="stylesheet" href="db.css">
    <script src="db.js" defer></script>
</head>
<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            <h1>📊 DB Dashboard</h1>
        </div>

        <button id="btnOpenModal" class="btn primary">
            ➕ Create New Table
        </button>

        <button id="btnRefresh" class="btn secondary">
            🔄 Refresh
        </button>

        <div class="table-count">
            Total Tables:
            <span id="tableCount">0</span>
        </div>

        <div id="tablesList" class="tables-list"></div>

    </aside>

   
    <main class="main">

        <div class="header">

            <div>
                <h2 id="currentTableName">
                    Select a Table
                </h2>

                <p id="recordCount">
                    Records: 0
                </p>
            </div>

        </div>

        <div class="table-wrapper">

            <table id="dataTable">

                <thead id="tableHeader"></thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </main>

</div>

<div id="tableModal" class="modal hidden">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Create New Table</h2>

            <span id="btnCloseModal" class="close">
                &times;
            </span>

        </div>

        <div class="form-group">

            <label>Table Name</label>

            <input
                type="text"
                id="tableName"
                placeholder="Example: Students"
            >

        </div>

        <div class="form-group">

            <label>Number of Columns</label>

            <input
                type="number"
                id="colCount"
                min="2"
                value="3"
            >

        </div>

        <div class="form-group">

            <label>Number of Rows</label>

            <input
                type="number"
                id="rowCount"
                min="2"
                value="4"
            >

        </div>

        <button id="btnGenerate" class="btn primary">
            Generate Grid
        </button>

        <div id="gridContainer"></div>

        <button id="btnSaveTable" class="btn success">
            Save Table
        </button>

    </div>

</div>



<div id="toast"></div>

</body>
</html>
